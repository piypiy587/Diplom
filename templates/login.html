<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Кировэнерго</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Специфические стили страницы входа */
        body {
            background: #0f172a !important; /* Глубокий темный фон как в приложении */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        }

        .login-wrap {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.6s ease;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo-icon {
            width: 64px;
            height: 64px;
            background: #1e293b;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .login-logo h1 {
            font-size: 24px;
            font-weight: 800;
            color: #FFFFFF;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-logo p {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 6px;
        }

        .login-card {
            background: #FFFFFF;
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* ИСПРАВЛЕНИЕ: Заставляем форму стоять вертикально */
        .login-card form {
            display: flex !important;
            flex-direction: column !important;
            align-items: stretch !important;
            gap: 20px !important;
            width: 100% !important;
        }

        .auth-label {
            font-size: 12px;
            font-weight: 800;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 2px; /* Увеличим межбуквенный интервал для красоты */
            margin-bottom: 30px;
            display: block;
            
            text-align: center; /* ГЛАВНОЕ: Текст по центру */
            
            /* Убираем полоску слева, так как она мешает центровке */
            border-left: none !important; 
            padding-left: 0 !important;
        }

        .field-wrap {
            display: flex !important;
            flex-direction: column !important;
            gap: 8px;
        }

        .field-wrap label {
            font-size: 11px;
            font-weight: 700;
            color: #64748B;
            text-transform: uppercase;
            margin-left: 4px;
        }

        .field-input {
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            padding: 14px 18px;
            background: #f8fafc;
            transition: all 0.2s;
        }

        .field-input:focus-within {
            border-color: #3b82f6;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .field-input input {
            border: none !important;
            outline: none !important;
            font-size: 15px;
            color: #0f172a;
            width: 100%;
            background: transparent !important;
            padding: 0 !important;
            height: auto !important;
        }

        .btn-login {
            width: 100%;
            background: #0f172a;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .error-msg {
            background: #fef2f2;
            color: #ef4444;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            margin-top: 15px;
            border: 1px solid #fee2e2;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-logo">
            <div class="login-logo-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
            </div>
            <h1>Кировэнерго</h1>
            <p>Система управления наряд-допусками</p>
        </div>

        <div class="login-card">
            <span class="auth-label">Авторизация</span>

            <form action="/login" method="POST">
                <div class="field-wrap">
                    <label>Имя пользователя</label>
                    <div class="field-input">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" name="username" placeholder="Введите логин" required>
                    </div>
                </div>

                <div class="field-wrap">
                    <label>Пароль</label>
                    <div class="field-input">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    ВОЙТИ В СИСТЕМУ ➔
                </button>
            </form>

            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
