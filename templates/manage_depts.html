<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление подразделениями</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Управление доступом</h1>
            <a href="/" class="btn-back">← В меню</a>
        </div>
    </header>
    <div class="container">
        <section class="stats-section">
            <h2>Добавить новое подразделение (РЭС)</h2>
            <form method="POST" style="display: flex; gap: 10px; margin-top: 20px;">
                <input type="text" name="dept_name" placeholder="Название РЭС (например, Слободской РЭС)" 
                       class="dotted-val" style="flex: 1; border: 1px solid #ddd; padding: 10px;" required>
                <button type="submit" class="btn btn-primary" style="padding: 10px 30px;">ДОБАВИТЬ</button>
            </form>
        </section>

        <section class="permits-table" style="margin-top: 30px;">
            <h2>Список существующих подразделений</h2>
            <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
                <thead>
                    <tr>
                        <th style="padding: 12px; text-align: left;">ID</th>
                        <th style="padding: 12px; text-align: left;">Название подразделения</th>
                    </tr>
                </thead>
                <tbody>
                    {% for dept in depts %}
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 12px;">{{ dept.id }}</td>
                        <td style="padding: 12px;">{{ dept.name }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </div>
    <script>
    lucide.createIcons();
    </script>
</body>
</html>
